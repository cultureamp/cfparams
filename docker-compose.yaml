services:
  git-cliff:
    image: orhunp/git-cliff:v2.12.0
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - GITHUB_TOKEN
      - RELEASE_USERNAME
      - RELEASE_EMAIL

  goreleaser:
    image: goreleaser/goreleaser:v2.13.2
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - GITHUB_TOKEN
      - GITHUB_HOMEBREW_TAP_TOKEN
      - RELEASE_USERNAME
      - RELEASE_EMAIL
